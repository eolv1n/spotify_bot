name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt
      - name: Lint (flake8)
        run: |
          flake8 .
        working-directory: ./ 

  test:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Run unit tests with coverage
        run: |
          pytest -q \
            --cov=. \
            --cov-branch \
            --junitxml=report.xml \
            --cov-report=html

      - name: Run smoke test script
        run: |
          chmod +x tests/e2e/smoke.sh
          tests/e2e/smoke.sh

      - name: Upload JUnit report
        uses: actions/upload-artifact@v4
        with:
          name: junit-report
          path: report.xml

      - name: Upload coverage HTML
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: htmlcov

  build-image:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Build Docker image (sanity check)
        run: |
          docker build -t spotify_bot:test .

  deploy:
    runs-on: ubuntu-latest
    needs: build-image
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Deploy to Debian VPS over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_KEY }}
          script_stop: true
          script: |
            export INSTALL_DIR=/opt/spotify_bot
            export BOT_ENV_FILE=/opt/spotify_bot_runtime/bot.env
            export BOT_CACHE_DIR=/opt/spotify_bot_runtime/cache
            export WG_CONFIG_DIR=/opt/spotify_bot_runtime/wireguard

            if [ ! -d "$INSTALL_DIR/.git" ]; then
              git clone --branch main https://github.com/eolv1n/spotify_bot.git "$INSTALL_DIR"
            fi

            cd "$INSTALL_DIR"
            git fetch origin main
            git checkout main
            git pull --ff-only origin main
            ./deploy.sh
