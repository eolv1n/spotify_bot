services:
  wireguard:
    image: lscr.io/linuxserver/wireguard:latest
    container_name: spotify_bot_wg
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - TZ=${TZ:-Europe/Moscow}
    volumes:
      - ${WG_CONFIG_DIR:-./deploy/wireguard}:/config
      - /lib/modules:/lib/modules:ro
    sysctls:
      - net.ipv4.conf.all.src_valid_mark=1
    healthcheck:
      test: ["CMD-SHELL", "wg show >/dev/null 2>&1 && ip link show wg0 >/dev/null 2>&1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    restart: unless-stopped

  spotify_bot:
    build:
      context: .
    image: spotify_bot:latest
    container_name: spotify_bot
    env_file:
      - ${BOT_ENV_FILE:-.env}
    network_mode: "service:wireguard"
    depends_on:
      wireguard:
        condition: service_healthy
    volumes:
      - ${BOT_CACHE_DIR:-./cache}:/app/cache
    restart: unless-stopped
    mem_limit: 300m
    cpus: 0.50
